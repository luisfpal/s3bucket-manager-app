# dev-deploy.yml — Continuous Deployment to the dev K3s cluster
#
# Trigger: push to `dev` branch
#
# Architecture:
#   Job 1 (build) runs on GitHub's managed ubuntu-latest runner — it has Docker
#   pre-installed and fast internet for pushing images to GHCR.
#
#   Job 2 (deploy) runs on the self-hosted runner inside K3s (installed via ci.sh).
#   It has direct in-cluster kubectl access via its ServiceAccount — no kubeconfig
#   file or SSH tunnel is needed.
#
# Migrations run automatically: the backend pod's CMD is:
#   python manage.py migrate --noinput && gunicorn ...
# So the new pod applies any new migrations before accepting traffic.
#
# Required GitHub repository secrets:
#   GHCR_TOKEN — GitHub classic PAT with write:packages scope (for pushing images)

name: Dev Deploy

on:
  push:
    branches:
      - dev

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u luisfpal --password-stdin

      - name: Build and push backend
        run: |
          docker build -t ghcr.io/luisfpal/buckets-explorer-backend:latest ./backend
          docker push ghcr.io/luisfpal/buckets-explorer-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ghcr.io/luisfpal/buckets-explorer-frontend:latest ./frontend
          docker push ghcr.io/luisfpal/buckets-explorer-frontend:latest

  deploy:
    name: Deploy to K3s
    needs: build
    # This runs on the self-hosted runner installed by k8s/ci.sh inside K3s.
    # The runner pod has a ServiceAccount bound to the deployer Role in bucket-explorer.
    runs-on: bucket-explorer-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply secrets and config
        # Secrets are pre-deployed in the cluster (from k8s/env/dev/*.local.yaml).
        # We only re-apply the tracked config (no secrets in this workflow).
        run: |
          kubectl apply -f k8s/manifests/app/00-namespace.yaml
          kubectl apply -f k8s/manifests/app/01-django-postgres.yaml
          kubectl apply -f k8s/manifests/app/02-backend.yaml
          kubectl apply -f k8s/manifests/app/03-frontend.yaml

      - name: Restart deployments to pull new images
        # imagePullPolicy: Always on both deployments ensures the fresh :latest is fetched.
        # The new backend pod runs `python manage.py migrate --noinput` before gunicorn starts.
        run: |
          kubectl rollout restart deployment/backend deployment/frontend -n bucket-explorer

      - name: Wait for rollout
        # Blocks until both pods are healthy. If a pod fails (e.g. migration error),
        # this step fails and the workflow is marked failed.
        run: |
          kubectl rollout status deployment/backend -n bucket-explorer --timeout=300s
          kubectl rollout status deployment/frontend -n bucket-explorer --timeout=300s

      - name: Apply dev ingress (if HAProxy IngressClass present)
        # The dev ingress is a catch-all — only applies in dev. Idempotent.
        run: |
          if kubectl get ingressclass haproxy-4 &>/dev/null 2>&1; then
            kubectl apply -f k8s/manifests/app/04-ingress.dev.yaml
            echo "Dev ingress applied"
          else
            echo "haproxy-4 IngressClass not found — skipping dev ingress"
          fi
