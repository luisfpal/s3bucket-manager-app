# ci.yml — Verification gate (tests, build, Codecov)
#
# verify: pytest + coverage + frontend build on every push/PR to main
#
# Dev deploy is manual on the operator host:
#   cd k8s && ./app.sh deploy --rebuild
# Image push uses GHCR_TOKEN in k8s/.env (see k8s/.env.example), not GitHub Actions secrets.
#
# Optional repository secret:
#   CODECOV_TOKEN — Codecov upload token (verify job; optional but recommended)

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "./backend[dev]"

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          DJANGO_DEBUG: "True"
        run: python -m pytest --cov=storage --cov-report=xml --cov-report=term-missing -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          fail_ci_if_error: false
