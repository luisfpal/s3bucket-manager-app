# Production public route for the frontend nginx service.
# The frontend serves the React app and proxies /api/* to backend-service.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buckets-explorer.areasciencepark.it
  namespace: bucket-explorer
  labels:
    app: frontend
    component: routing
spec:
  ingressClassName: haproxy-4
  rules:
    - host: buckets-explorer.areasciencepark.it
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
