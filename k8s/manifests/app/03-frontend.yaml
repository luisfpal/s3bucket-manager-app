# Frontend SPA served by nginx.
# nginx also proxies /api/* to backend-service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bucket-explorer
  labels:
    app: frontend
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: ui
    spec:
      containers:
        - name: frontend
          image: ghcr.io/luisfpal/buckets-explorer-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          # nginx: serves pre-built static SPA files + reverse-proxies /api/* to backend-service.
          # Entirely IO-bound — no computation happens here. The bundle is served from memory.
          # 1 CPU / 1Gi (old value) was 10× over-provisioned and wasted namespace quota.
          #
          # DEV:  requests=50m/64Mi,   limits=200m/256Mi
          # PROD: requests=100m/128Mi, limits=500m/512Mi  → handles hundreds of concurrent static
          #       requests and thousands of API proxies per second; quota: ~0.5/8 CPU, ~0.5/32Gi.
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Internal service for frontend pods.
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: bucket-explorer
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
