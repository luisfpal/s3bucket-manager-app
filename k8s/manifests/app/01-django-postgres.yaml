# PostgreSQL for Django application data.
# Values must match backend-config/backend-secret database settings.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: django-postgres-pvc
  namespace: bucket-explorer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-postgres
  namespace: bucket-explorer
  labels:
    app: django-postgres
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-postgres
  template:
    metadata:
      labels:
        app: django-postgres
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "djangodb"
            - name: POSTGRES_USER
              value: "djangouser"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-password
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - djangouser
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: django-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: django-postgres
  namespace: bucket-explorer
spec:
  type: ClusterIP
  selector:
    app: django-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
