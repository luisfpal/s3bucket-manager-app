# PostgreSQL for Django application data.
# Values must match backend-config/backend-secret database settings.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: django-postgres-pvc
  namespace: bucket-explorer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-postgres
  namespace: bucket-explorer
  labels:
    app: django-postgres
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-postgres
  template:
    metadata:
      labels:
        app: django-postgres
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "djangodb"
            - name: POSTGRES_USER
              value: "djangouser"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-password
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          # PostgreSQL: IO-bound, NOT CPU-bound. Memory is the key resource (shared_buffers cache,
          # connection overhead ~5-10 MB per connection).
          # With gunicorn 2 workers + admin panel, expect ~10-15 concurrent DB connections.
          #
          # DEV:  requests=250m/512Mi, limits=1000m/1Gi
          # PROD: requests=500m/2Gi,   limits=2000m/8Gi  → quota: ~2/8 CPU, ~8/32Gi memory.
          #       Tune shared_buffers to ~25% of memory limit (2Gi for 8Gi limit):
          #       add env POSTGRES_INITDB_ARGS: "--shared-buffers=2GB" or mount a postgresql.conf.
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - djangouser
                - -d
                - djangodb
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - djangouser
                - -d
                - djangodb
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: django-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: django-postgres
  namespace: bucket-explorer
spec:
  type: ClusterIP
  selector:
    app: django-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
