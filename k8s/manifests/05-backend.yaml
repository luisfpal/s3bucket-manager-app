# Django backend deployment and internal service.
# Runtime configuration is provided via backend-config/backend-secret overlays.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: storage-system
  labels:
    app: backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      # Ensure dependencies are reachable before starting Django.
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h django-postgres -U djangouser; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "PostgreSQL is ready!"

        - name: wait-for-authentik
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              until curl -f http://authentik-service:9000/-/health/live/; do
                echo "Waiting for Authentik..."
                sleep 5
              done
              echo "Authentik is ready!"

      containers:
        - name: backend
          image: registry.stencil.com:5000/s3mgr-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: django-secret-key
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-password
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: oidc-client-secret
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: s3-secret-key
            - name: RGWSQUARED_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: rgwsquared-username
            - name: RGWSQUARED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: rgwsquared-password
            - name: DJANGO_SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: django-superuser-password
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5

---
# Internal service consumed by frontend nginx reverse proxy.
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: storage-system
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
