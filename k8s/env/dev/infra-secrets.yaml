# Authentik infrastructure secrets (authentik-bucket-explorer namespace).
# Managed by infra administrators — the webapp does not need to know these values.
# Real values go in infra-secrets.local.yaml (gitignored).
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: authentik-bucket-explorer
type: Opaque
stringData:
  secret-key: "CHANGE_ME_DEV_AUTHENTIK_SECRET_KEY"
  bootstrap-password: "CHANGE_ME_DEV_AUTHENTIK_BOOTSTRAP_PASSWORD"
  postgres-password: "CHANGE_ME_DEV_AUTHENTIK_POSTGRES_PASSWORD"
  bootstrap-token: ""
