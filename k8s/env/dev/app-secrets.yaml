# Application secrets for the webapp (bucket-explorer namespace).
# Real values go in app-secrets.local.yaml (gitignored).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: bucket-explorer
type: Opaque
stringData:
  django-secret-key: "CHANGE_ME_DEV_DJANGO_SECRET_KEY"
  database-password: "CHANGE_ME_DEV_DATABASE_PASSWORD"
  oidc-client-secret: "CHANGE_ME_DEV_OIDC_CLIENT_SECRET"
  rgwsquared-username: "CHANGE_ME_DEV_RGWSQUARED_USERNAME"
  rgwsquared-password: "CHANGE_ME_DEV_RGWSQUARED_PASSWORD"
  django-superuser-password: "CHANGE_ME_DEV_SUPERUSER_PASSWORD"
