apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: storage-system
type: Opaque
stringData:
  django-secret-key: "CHANGE_ME_DEV_DJANGO_SECRET_KEY"
  database-password: "CHANGE_ME_DEV_DJANGO_DB_PASSWORD"
  oidc-client-secret: "CHANGE_ME_DEV_OIDC_CLIENT_SECRET"
  s3-access-key: "CHANGE_ME_DEV_S3_ACCESS_KEY"
  s3-secret-key: "CHANGE_ME_DEV_S3_SECRET_KEY"
  rgwsquared-username: "CHANGE_ME_DEV_RGWSQUARED_USERNAME"
  rgwsquared-password: "CHANGE_ME_DEV_RGWSQUARED_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: storage-system
type: Opaque
stringData:
  secret-key: "CHANGE_ME_DEV_AUTHENTIK_SECRET_KEY"
  bootstrap-password: "CHANGE_ME_DEV_AUTHENTIK_BOOTSTRAP_PASSWORD"
  postgres-password: "CHANGE_ME_DEV_AUTHENTIK_POSTGRES_PASSWORD"
  bootstrap-token: "CHANGE_ME_DEV_AUTHENTIK_BOOTSTRAP_TOKEN"
