apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: storage-system
data:
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "REPLACE_WITH_PROD_ALLOWED_HOSTS"
  DJANGO_LOG_LEVEL: "INFO"
  OAUTH_LOG_LEVEL: "INFO"

  DATABASE_HOST: "django-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "djangodb"
  DATABASE_USER: "djangouser"

  S3_ENDPOINT: "REPLACE_WITH_PROD_S3_ENDPOINT"
  S3_USE_SSL: "True"
  S3_VERIFY_SSL: "True"
  S3_REGION: "us-east-1"

  AUTHENTIK_URL: "http://authentik-service:9000"
  AUTHENTIK_EXTERNAL_URL: "REPLACE_WITH_PROD_AUTHENTIK_EXTERNAL_URL"
  OIDC_CLIENT_ID: "bucket-manager"

  RGWSQUARED_URL: "REPLACE_WITH_PROD_RGWSQUARED_URL"

  DJANGO_SUPERUSER_USERNAME: "admin"
  DJANGO_SUPERUSER_EMAIL: "REPLACE_WITH_PROD_DJANGO_SUPERUSER_EMAIL"
