apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: storage-system
type: Opaque
stringData:
  django-secret-key: "REPLACE_WITH_PROD_DJANGO_SECRET_KEY"
  database-password: "REPLACE_WITH_PROD_DJANGO_DB_PASSWORD"
  oidc-client-secret: "REPLACE_WITH_PROD_OIDC_CLIENT_SECRET"
  s3-access-key: "REPLACE_WITH_PROD_S3_ACCESS_KEY"
  s3-secret-key: "REPLACE_WITH_PROD_S3_SECRET_KEY"
  rgwsquared-username: "REPLACE_WITH_PROD_RGWSQUARED_USERNAME"
  rgwsquared-password: "REPLACE_WITH_PROD_RGWSQUARED_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-secret
  namespace: storage-system
type: Opaque
stringData:
  secret-key: "REPLACE_WITH_PROD_AUTHENTIK_SECRET_KEY"
  bootstrap-password: "REPLACE_WITH_PROD_AUTHENTIK_BOOTSTRAP_PASSWORD"
  postgres-password: "REPLACE_WITH_PROD_AUTHENTIK_POSTGRES_PASSWORD"
  bootstrap-token: "REPLACE_WITH_PROD_AUTHENTIK_BOOTSTRAP_TOKEN"
