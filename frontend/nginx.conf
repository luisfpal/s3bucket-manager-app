# ==============================================================================
# nginx.conf — The Frontend's Reverse Proxy Configuration
# ==============================================================================
#
# This file runs INSIDE the frontend pod's nginx container.
# It was copied here during `podman build` (see frontend/Containerfile, Stage 2).
#
# NGINX DOES TWO JOBS HERE:
#
#   Job 1: STATIC FILE SERVER (React SPA)
#   ─────────────────────────────────────
#   Serves the compiled React app (HTML, JS, CSS, images).
#   React Router uses client-side routing, so ALL non-file, non-API routes
#   must return index.html (the SPA fallback pattern).
#
#   Job 2: REVERSE PROXY (API → Django)
#   ────────────────────────────────────
#   Forwards /api/* requests to the Django backend pod.
#   This is the BFF (Backend-for-Frontend) pattern.
#
# WHY BFF? WHY SAME ORIGIN?
#   During OAuth2 login, Django sets a session cookie. Browser cookies are
#   only sent to the SAME ORIGIN. If React (port 3000) and Django (port 8000)
#   were on different origins, the cookie wouldn't be sent → login breaks.
#   nginx proxying makes both appear as the same origin (localhost:3000).
#
# REQUEST FLOW:
#   Browser → localhost:3000 → SSH tunnel → port-forward → nginx :80
#     │
#     ├── /dashboard          → try_files → /usr/share/nginx/html/index.html
#     ├── /auth/callback      → try_files → /usr/share/nginx/html/index.html
#     ├── /assets/main.js     → try_files → /usr/share/nginx/html/assets/main.js
#     │
#     └── /api/buckets/       → proxy_pass → backend-service:8000/api/buckets/
#         /api/auth/token/    → proxy_pass → backend-service:8000/api/auth/token/
#         /api/oauth/login/.. → proxy_pass → backend-service:8000/api/oauth/login/..
#
# CONNECTION MAP:
#   This file (nginx.conf)                  05-backend.yaml
#   ┌────────────────────────────┐          ┌──────────────────┐
#   │ upstream backend {         │          │ Service:          │
#   │   server backend-service   ├─────────►│ backend-service   │
#   │   .bucket-explorer          │  (DNS)   │ port 8000         │
#   │   .svc.cluster.local:8000  │          │                  │
#   │ }                          │          │ Pod: gunicorn    │
#   └────────────────────────────┘          └──────────────────┘
# ==============================================================================

# The "upstream" block defines the backend server pool.
# In production, you could add multiple servers here for load balancing.
# K3s CoreDNS resolves this service name to the backend pod's ClusterIP.
upstream backend {
    server backend-service.bucket-explorer.svc.cluster.local:8000;
    #      ↑ Service name    ↑ Namespace      ↑ K8s DNS suffix  ↑ Port
    #      from 05-backend   from 00-namespace                   gunicorn listens here
}

server {
    listen 80;                  # nginx listens on port 80 inside the container
    server_name _;              # Accept requests for any hostname

    # Where React's compiled files live (copied from builder stage in Containerfile)
    root /usr/share/nginx/html;
    index index.html;

    # --- Static assets with aggressive caching ---
    # Vite adds content hashes to filenames (main.a1b2c3.js), so they're safe
    # to cache forever — when the content changes, the filename changes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Admin Sync endpoints need longer timeout ---
    # Individual sync steps (CSV upload, proposals, generate, apply) can take
    # up to 60s each. Default proxy_read_timeout of 60s is too tight.
    location /api/admin/sync/ {
        proxy_pass http://backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        client_max_body_size 100M;
    }

    # --- API Proxy ---
    # ALL /api/* requests are forwarded to the Django backend.
    # This includes:
    #   /api/oauth/login/authentik/     → Start OAuth2 (redirect chain to Authentik)
    #   /api/oauth/complete/authentik/  → OAuth2 callback (Django processes auth code)
    #   /api/auth/token/               → Session-to-JWT exchange (AuthCallback.tsx calls this)
    #   /api/auth/user/                → Current user info (Profile.tsx, Dashboard.tsx)
    #   /api/auth/refresh/             → JWT token refresh (api.ts interceptor)
    #   /api/buckets/*                 → Bucket CRUD (Dashboard.tsx, BucketDetail.tsx)
    #   /api/health/                   → K8s probe endpoint (05-backend.yaml probes)
    location /api/ {
        proxy_pass http://backend;          # ← Uses the upstream block defined above
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CRITICAL for OAuth2: pass cookies between browser ↔ Django
        # Without these two lines, the session cookie wouldn't be forwarded,
        # and the token exchange in AuthCallback.tsx would fail.
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        # File upload limit — must be >= what Django/gunicorn accepts
        # Bucket upload endpoints stream the file body into S3 with put_object.
        client_max_body_size 100M;
    }

    # --- React Router SPA Fallback ---
    # For ANY URL that isn't a real file or /api/* route:
    #   1. try_files checks if the file exists on disk
    #   2. If not, serve index.html (React Router handles the URL client-side)
    #
    # This is why /dashboard, /auth/callback, /profile all work —
    # they're not real files, but React Router components.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
